name: Run Kaggle Notebook

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '30 4 * * *'
  workflow_dispatch:

concurrency:
  group: kaggle-notebook-run
  cancel-in-progress: true

jobs:
  push-kaggle-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          if [ -n "$KAGGLE_API_TOKEN" ]; then
            printf '%s' "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
            chmod 600 ~/.kaggle/access_token
          elif [ -n "$KAGGLE_USERNAME" ] && [ -n "$KAGGLE_KEY" ]; then
            printf '{"username":"%s","key":"%s"}' "$KAGGLE_USERNAME" "$KAGGLE_KEY" > ~/.kaggle/kaggle.json
            chmod 600 ~/.kaggle/kaggle.json
          else
            echo "Missing Kaggle credentials. Set KAGGLE_API_TOKEN or KAGGLE_USERNAME/KAGGLE_KEY." >&2
            exit 1
          fi

      - name: Stamp notebook version
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          ts = datetime.now(timezone.utc).strftime("%Y%m%d%H%M%S")
          sha = os.environ["GITHUB_SHA"][:7]
          slug = f"ai-news-finder-daily-{ts}-{sha}"
          title = f"ai-news-finder-daily-{ts}-{sha}"

          metadata_path = Path("my-kaggle-notebook/kernel-metadata.json")
          metadata = json.loads(metadata_path.read_text())
          metadata["id"] = f"aisangh/{slug}"
          metadata["title"] = title
          metadata_path.write_text(json.dumps(metadata, indent=2) + "\n")

          notebook_path = Path("my-kaggle-notebook/notebook.ipynb")
          notebook = json.loads(notebook_path.read_text())
          metadata = notebook.setdefault("metadata", {})
          metadata["codex_build_stamp"] = {
              "sha": sha,
              "run_number": os.environ["GITHUB_RUN_NUMBER"],
              "run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "utc": ts,
          }
          notebook_path.write_text(json.dumps(notebook, indent=1, ensure_ascii=False) + "\n")
          PY

      - name: Push notebook to Kaggle
        run: kaggle kernels push -p ./my-kaggle-notebook

      - name: Wait for Kaggle run and download output
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import time

          metadata = json.loads(pathlib.Path("my-kaggle-notebook/kernel-metadata.json").read_text())
          kernel_id = metadata["id"]
          output_dir = pathlib.Path("kaggle-output")
          output_dir.mkdir(parents=True, exist_ok=True)

          def kernel_status() -> str:
              try:
                  raw = subprocess.check_output(
                      ["kaggle", "kernels", "status", kernel_id],
                      stderr=subprocess.STDOUT,
                      text=True,
                  )
              except subprocess.CalledProcessError as exc:
                  raw = exc.output or ""
              return raw.strip()

          terminal_states = ("complete", "completed", "error", "failed", "cancelled", "canceled")
          print(f"Watching Kaggle run: {kernel_id}")

          for attempt in range(180):
              status = kernel_status()
              compact = " ".join(status.lower().split())
              print(f"status[{attempt + 1}]: {status or 'unknown'}")
              if any(state in compact for state in terminal_states):
                  if "complete" in compact or "completed" in compact:
                      break
                  raise SystemExit(f"Kaggle run did not complete successfully: {status}")
              time.sleep(60)
          else:
              raise SystemExit("Timed out waiting for Kaggle run to finish.")

          subprocess.run(
              ["kaggle", "kernels", "output", kernel_id, "-p", str(output_dir)],
              check=True,
          )

          report_files = sorted(
              list(output_dir.rglob("*.html")),
              key=lambda path: path.stat().st_mtime,
              reverse=True,
          )
          if report_files:
              print(f"Report downloaded: {report_files[0]}")
          else:
              print("No report file downloaded.")
          PY

      - name: Send Discord summary
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import os
          import json
          import pathlib
          import requests

          webhook_url = os.getenv("DISCORD_WEBHOOK_URL")
          if not webhook_url:
              print("DISCORD_WEBHOOK_URL not set. Skipping Discord notification.")
              raise SystemExit(0)

          metadata = json.loads(pathlib.Path("my-kaggle-notebook/kernel-metadata.json").read_text())
          kernel_id = metadata["id"]
          output_dir = pathlib.Path("kaggle-output")
          report_files = sorted(
              list(list(output_dir.rglob("*.html")),
              key=lambda path: path.stat().st_mtime,
              reverse=True,
          )

          content = f"AI News Finder completed on Kaggle: `{kernel_id}`"

          if report_files:
              report_path = report_files[0]
              with report_path.open("rb") as f:
                  files = {"file": (report_path.name, f)}
                  data = {"content": content}
                  response = requests.post(webhook_url, data=data, files=files, timeout=30)
          else:
              response = requests.post(webhook_url, json={"content": content}, timeout=30)

          response.raise_for_status()
          print("Discord notification sent.")
          PY
